<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Analytics — Approvlinq</title>
  <script>
    (function(){ try { var t = localStorage.getItem("ap_theme"); if (t==="light"||t==="dark") document.documentElement.setAttribute("data-theme", t); } catch(e){} })();
  </script>
  <link rel="stylesheet" href="/static/css/tokens.css" />
  <link rel="stylesheet" href="/static/css/components.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</head>
<body class="ap-app">
  <div data-ap-shell='{"active":"analytics","crumb":[["Work",""],["Analytics","cur"]]}'></div>
  <div data-ap-page-body>
    <div class="ap-page">
<div id="pageMessage" class="message"></div>

      <div class="toolbar" style="margin-bottom:16px; display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
        <label for="tenantSelector" class="sr-only">Tenant</label>
        <select id="tenantSelector" class="ap-select" style="min-width:180px;" aria-label="Tenant"></select>
        <label for="companySelector" class="sr-only">Company</label>
        <select id="companySelector" class="ap-select" style="min-width:200px;" aria-label="Company"></select>
      </div>

      <main class="stack" style="gap:24px; padding: 0 0 40px 0;">

        <div class="stat-grid">
          <div class="stat-card">
            <div class="stat-label">Total Invoices</div>
            <div class="stat-value" id="statTotalRows">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Total Spend</div>
            <div class="stat-value" id="statTotalSpend">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Distinct Suppliers</div>
            <div class="stat-value" id="statDistinctSuppliers">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Needs Review</div>
            <div class="stat-value" id="statNeedsReview">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Avg Confidence</div>
            <div class="stat-value" id="statAvgConfidence">—</div>
          </div>
        </div>

        <div class="grid">
          <section class="card">
            <h2>Monthly Expenses</h2>
            <div style="position:relative; min-height:260px;">
              <canvas id="monthlyChart"></canvas>
              <p id="monthlyEmpty" class="muted" style="display:none; text-align:center; padding:40px 0;">No dated invoices found for this period.</p>
            </div>
          </section>

          <section class="card">
            <h2>Top Suppliers</h2>
            <div style="position:relative; min-height:260px;">
              <canvas id="suppliersChart"></canvas>
              <p id="suppliersEmpty" class="muted" style="display:none; text-align:center; padding:40px 0;">No supplier data found.</p>
            </div>
          </section>
        </div>

      </main>
    </div>
  </div>
  <script src="/static/js/common.js"></script>
  <script src="/static/js/ap-ui.js"></script>
  <script src="/static/js/analytics.js"></script>
</body>
</html>
