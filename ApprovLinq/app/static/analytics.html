<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Approvlinq Analytics</title>
  <link rel="stylesheet" href="/static/css/app.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="page-shell">
    <div class="page">

      <header class="hero scanner-hero">
        <div class="hero-copy">
          <div class="hero-copy-top">
            <h1>Analytics</h1>
            <div class="version-badge">v3.62.0</div>
          </div>
          <div class="hero-copy-bottom">
            <select id="tenantSelector"></select>
            <select id="companySelector"><option value="">Select company</option></select>
          </div>
        </div>

        <div class="hero-actions">
          <div class="hero-logo-wrap">
            <img src="/static/img/approvlinq-logo.png" alt="Approvlinq" class="hero-logo" />
          </div>
          <div class="hero-toolbar">
            <div class="hero-toolbar-left"></div>
            <div class="hero-toolbar-right">
              <a id="platformAdminLink" class="btn btn-secondary hidden" href="/static/admin.html">Platform Admin</a>
              <a id="tenantAdminLink" class="btn btn-secondary" href="/static/tenant.html">Tenant Admin</a>
              <a class="btn btn-secondary" href="/static/scanner.html">Scanner</a>
              <button id="logoutBtn" class="btn btn-secondary" type="button">Logout</button>
            </div>
          </div>
        </div>
      </header>

      <div id="pageMessage" class="message"></div>

      <main class="stack" style="gap:24px; padding: 0 0 40px 0;">

        <div class="stat-grid">
          <div class="stat-card">
            <div class="stat-label">Total Invoices</div>
            <div class="stat-value" id="statTotalRows">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Total Spend</div>
            <div class="stat-value" id="statTotalSpend">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Distinct Suppliers</div>
            <div class="stat-value" id="statDistinctSuppliers">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Needs Review</div>
            <div class="stat-value" id="statNeedsReview">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Avg Confidence</div>
            <div class="stat-value" id="statAvgConfidence">—</div>
          </div>
        </div>

        <div class="grid">
          <section class="card">
            <h2>Monthly Expenses</h2>
            <div style="position:relative; min-height:260px;">
              <canvas id="monthlyChart"></canvas>
              <p id="monthlyEmpty" class="muted" style="display:none; text-align:center; padding:40px 0;">No dated invoices found for this period.</p>
            </div>
          </section>

          <section class="card">
            <h2>Top Suppliers</h2>
            <div style="position:relative; min-height:260px;">
              <canvas id="suppliersChart"></canvas>
              <p id="suppliersEmpty" class="muted" style="display:none; text-align:center; padding:40px 0;">No supplier data found.</p>
            </div>
          </section>
        </div>

      </main>
    </div>
  </div>

  <script src="/static/js/common.js"></script>
  <script src="/static/js/analytics.js"></script>
</body>
</html>
