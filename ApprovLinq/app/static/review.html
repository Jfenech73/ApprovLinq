<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>Review Batch - ApprovLinq</title>
<link rel="stylesheet" href="/static/css/app.css">
<style>
.review-wrap{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:16px}
.panel{background:#fff;border:1px solid #e3e3e3;border-radius:8px;padding:12px;overflow:auto;max-height:90vh}
.row-card{padding:8px;border-bottom:1px solid #eee;cursor:pointer}
.row-card.flagged{background:#fff7e6}.row-card.corrected{background:#e6f7ff}
.row-card.selected{background:#dff0d8}
.field-row{display:grid;grid-template-columns:140px 1fr auto auto;gap:6px;align-items:center;margin:4px 0}
.status-pill{display:inline-block;padding:2px 10px;border-radius:12px;background:#eee;font-size:12px}
.status-pill.in_review{background:#ffe7a3}.status-pill.approved{background:#c6f0c8}.status-pill.exported{background:#cfe2ff}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.toolbar button,.actions button{padding:6px 12px;border:1px solid #aaa;border-radius:4px;background:#f7f7f7;cursor:pointer}
.actions{margin-top:12px;display:flex;gap:8px;flex-wrap:wrap}
.preview-img{max-width:100%;border:1px solid #ddd}
.note-area{width:100%;min-height:50px;margin-top:6px}
.force-add{color:#c00;font-size:12px}
.rule-cb{font-size:11px;color:#555}
</style></head>
<body>
<div id="header"></div>
<div class="review-wrap">
  <div class="panel" id="left">
    <div id="batch-header"></div>
    <div class="toolbar">
      <button data-filter="all">All</button>
      <button data-filter="needs_review">Needs review</button>
      <button data-filter="corrected">Corrected</button>
      <button data-filter="low_conf">Low confidence</button>
    </div>
    <div id="row-list"></div>
    <div id="row-editor"></div>
    <div class="actions">
      <button id="btn-approve">Approve</button>
      <button id="btn-export">Export</button>
      <button id="btn-reopen">Reopen (if exported)</button>
    </div>
  </div>
  <div class="panel" id="right">
    <h3>Invoice preview</h3>
    <div><button id="prev-page">◀</button> <span id="page-label">page 1</span> <button id="next-page">▶</button>
      <label style="margin-left:12px"><input type="checkbox" id="remap-mode"> Remap mode</label>
    </div>
    <img id="preview-img" class="preview-img" alt="preview">
    <div id="audit-panel"><h4>Row history</h4><div id="audit-list"></div></div>
  </div>
</div>
<script src="/static/js/review.js"></script>
</body></html>
