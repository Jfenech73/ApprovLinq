<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Review — Approvlinq</title>
  <script>
    (function(){ try { var t = localStorage.getItem("ap_theme"); if (t==="light"||t==="dark") document.documentElement.setAttribute("data-theme", t); } catch(e){} })();
  </script>
  <link rel="stylesheet" href="/static/css/tokens.css" />
  <link rel="stylesheet" href="/static/css/components.css" />
</head>
<body class="ap-app">
  <div data-ap-shell='{"active":"","crumb":[["Work",""],["Batches",""],["Review","cur"]]}'></div>
  <div data-ap-page-body>
    <div class="ap-page">
      <div id="pageMessage" class="message"></div>

      <main class="stack-lg">
        <section class="card">
          <div class="section-head">
            <div style="display:flex;align-items:center;gap:12px">
              <h2 id="batchTitle" style="margin:0">Loading…</h2>
              <span class="pill" id="batchStatusPill">—</span>
            </div>
            <div class="row gap-sm wrap">
              <button id="approveBtn" class="btn" type="button">Approve</button>
              <button id="markFileReviewedBtn" class="btn" type="button" hidden>Mark file reviewed</button>
              <button id="exportBtn"  class="btn btn-primary"   type="button">Export Excel</button>
              <button id="reopenBtn"  class="btn" type="button">Reopen</button>
            </div>
          </div>
          <div class="batch-meta">
            <div><span class="label">Rows</span><span id="statRows">-</span></div>
            <div><span class="label">Corrected</span><span id="statCorrected">-</span></div>
            <div><span class="label">Flagged</span><span id="statFlagged">-</span></div>
            <div><span class="label">Export version</span><span id="statVersion">-</span></div>
          </div>
        </section>

        <div class="review-grid" style="display:grid;grid-template-columns:1fr;gap:16px">
          <section class="card">
            <div class="section-head">
              <h2 style="margin:0">Rows</h2>
              <div class="row gap-sm wrap filter-chips">
                <button class="btn btn-sm active" data-filter="all" type="button">All</button>
                <button class="btn btn-sm"        data-filter="needs_review" type="button">Needs review</button>
                <button class="btn btn-sm"        data-filter="corrected"    type="button">Corrected</button>
                <button class="btn btn-sm"        data-filter="low_conf"     type="button">Low confidence</button>
              </div>
            </div>
            <div id="rowList" class="row-list"></div>
          </section>

          <section class="card">
            <div class="section-head">
              <h2 style="margin:0">Edit selected row</h2>
            </div>
            <div id="rowEditor" class="stack"></div>
            <!-- Hidden stubs keep review.js remap/pagination references valid -->
            <div id="remapHint" class="remap-hint" hidden>
              <span id="remapTargetLabel" class="remap-target"></span>
            </div>
            <div id="previewWrap" style="display:none">
              <img id="previewImg" alt="" draggable="false" />
              <div id="remapSelection" hidden></div>
              <div id="previewUnavailable" hidden>
                <p id="previewUnavailableMsg"></p>
              </div>
            </div>
            <!-- Page controls stub (hidden — preview removed but JS still references them) -->
            <div style="display:none">
              <button id="prevPageBtn" type="button">◀</button>
              <span id="pageLabel"></span>
              <button id="nextPageBtn" type="button">▶</button>
              <input type="checkbox" id="remapMode" />
            </div>
            <div class="stack" style="margin-top:12px">
              <h3>Row history</h3>
              <div id="auditList"></div>
            </div>
          </section>
        </div>
      </main>
    </div>
  </div>

  <script src="/static/js/common.js"></script>
  <script src="/static/js/review.js"></script>
  <script src="/static/js/ap-ui.js"></script>
</body>
</html>
