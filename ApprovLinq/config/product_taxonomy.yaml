# Product & Brand Taxonomy
# ─────────────────────────────────────────────────────────────────────────────
# Each category maps brands/products to a nominal account hint.
# Classification order: taxonomy_match → supplier_rule → historical → llm_fallback
#
# Fields per entry:
#   brand       - canonical brand/product name
#   aliases     - OCR-noise and spelling variants (lowercase, no punctuation)
#   product_family
#   subcategory
#   nominal_hint - substring to match against tenant nominal account names
#   supplier_hints - canonical supplier name substrings that sell this brand

