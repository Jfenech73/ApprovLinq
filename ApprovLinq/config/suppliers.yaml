# Supplier Master Configuration
# ─────────────────────────────────────────────────────────────────────────────
# Each supplier entry supports:
#   canonical       - the normalized display name stored in DB
#   vat_number      - VAT number for authoritative matching
#   aliases         - OCR variants and abbreviations (case-insensitive)
#   date_locale     - "dmy" (default) or "mdy" if invoices use month-first
#   nominal_hint    - substring to match against nominal account names
#   product_families - expected product categories for this supplier
#   invoice_number_pattern - regex hint for validating invoice numbers

