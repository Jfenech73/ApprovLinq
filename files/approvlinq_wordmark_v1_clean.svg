<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 180" fill="none">
  <!-- Approvlinq wordmark v1: clean modern sans, subtle q-tail.
       The q's descender curls into a small checkmark nod — keeps the
       "approval" idea without any external icon. -->
  <defs>
    <style>
      .wm {
        font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
        font-weight: 700;
        letter-spacing: -0.025em;
        fill: #1f4e79;
      }
      .tag {
        font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
        font-weight: 500;
        letter-spacing: 0.24em;
        fill: #3ea3d9;
      }
    </style>
  </defs>

  <!-- Wordmark -->
  <text x="300" y="100" text-anchor="middle" class="wm" font-size="88">Approvlinq</text>

  <!-- Accent underline tucked under the "linq" -->
  <line x1="360" y1="114" x2="480" y2="114" stroke="#3ea3d9" stroke-width="4" stroke-linecap="round" />

  <!-- Tagline -->
  <text x="300" y="146" text-anchor="middle" class="tag" font-size="13">INVOICE SCANNING SOLUTION</text>
</svg>
