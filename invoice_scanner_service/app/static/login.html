<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Approvlinq Login</title>
  <link rel="stylesheet" href="/static/css/app.css" />
</head>
<body>
  <div class="page-shell login-shell">
    <section class="card login-card">
      <div class="hero mini-hero">
        <div class="hero-copy">
          <h1>Approvlinq</h1>
          <div class="version-badge">v3.02</div>
        </div>
        <div class="hero-actions">
          <div class="row gap-sm wrap">
            <button id="helpBtn" class="help-trigger" type="button" aria-label="Open help">?</button>
          </div>
          <img src="/static/img/approvlinq-logo.png" alt="Approvlinq" class="hero-logo" />
        </div>
      </div>
      <h2>Login</h2>
      <form id="loginForm" class="stack">
        <label for="email">Email</label>
        <input id="email" type="text" placeholder="you@company.com" required />
        <label for="password">Password</label>
        <input id="password" type="password" placeholder="Enter password" required />
        <button class="btn btn-primary" type="submit">Sign in</button>
      </form>
      <div id="loginMessage" class="message"></div>
    </section>
  </div>
  <script src="/static/js/common.js"></script>
  <script src="/static/js/login.js"></script>
</body>
</html>
